<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Book form</title>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" 
              rel="stylesheet" 
              integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" 
              crossorigin="anonymous">
    </head>
    <body>
        <nav th:replace="fragments/fragments::navbar"></nav>
        <h1>Formulario de creacion de Libro</h1>
        <div class="container">
            <form th:action="@{/author/addBook}" method="POST" th:object="${book}" enctype="multipart/form-data" class="form container m-5 justify-content-between float-left">
                <!--th:action="@{/book/form}"-->
                <div class="mb-3">
                    <label class="form-label"> Nombre:</label>
                    <input type="text" class="form-control" placeholder="Nombre del libro" th:field="*{name}" />
                </div>
                <div class="mb-3">
                    <label class="form-label"> Categoría:</label>
                    <input type="text" class="form-control" placeholder="Drama, Terror, etc" th:field="*{category}" />
                </div>
                <div class="mb-3">
                    <label class="form-label"> Unidades disponibles:</label>
                    <input type="text" class="form-control" placeholder="Stock" th:field="*{stock}" />
                </div>
                <div class="mb-3">
                    <label class="form-label"> Páginas:</label>
                    <input type="text" class="form-control" placeholder="Número de Páginas" th:field="*{pages}" />
                </div>
                <div class="mb-3">
                    <label class="form-label"> Precio:</label>
                    <input type="text" class="form-control" placeholder="Precio en pesos ARG" th:field="*{price}" />
                </div>
                <div>
                    <label class="form-label"> Foto de Portada:
                    <input type="file" name="photoFile" class="form-control mb-2">
                </div>
                <input type='submit' value='guardar'/>
                
                <p th:if="${error != null}" th:text="${error}" style="color : red;"></p>
            </form>
            
        </div>
    </body>
</html>
