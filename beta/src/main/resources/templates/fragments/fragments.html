<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" 
              rel="stylesheet" 
              integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" 
              crossorigin="anonymous">
    </head>
    <body>
        <div th:fragment="navbar">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">

                <div class="container">
                    <a class="navbar-brand " th:href="@{/}">Index</a>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <form class="navbar-nav mr-auto container m-2">
                            <a sec:authorize="!isAuthenticated()" class="nav-link active" th:href="@{/registerRole}">Registrate</a>
                            <a sec:authorize="!isAuthenticated()" class="nav-link active" th:href="@{/login}">Inicia sesión</a>



                            <a sec:authorize="hasAnyRole('ADMIN')" class="nav-link active" th:href="@{/customer}">Lista de customers</a>

                            <a sec:authorize="isAuthenticated()"class="nav-link active" th:href="@{/author}">Autores</a>

                            <a class="nav-link active" th:href="@{/book}">Lista de Libros</a>

                            <a sec:authorize="hasAnyRole('AUTHOR')" class="d-flex btn btn-info" th:href="@{/author/addBook}"> Agregar Libro </a>

                            <a sec:authorize="isAuthenticated()" class="btn btn-outline-success my-sm-0" th:href="@{/logout}">Cerrar Sesión</a>

                            <a sec:authorize="hasAnyRole('AUTHOR')" class="nav-link active" th:if="${session.authorsession != null}" th:href="@{/author/profile}">Perfil </a> 
                            <a sec:authorize="hasAnyRole('USER')" class="nav-link active" th:if="${session.customersession != null}" th:href="@{/customer/profile}">Perfil </a>

                        </form>
                        <!--<a sec:authorize="hasAnyRole('USER')"class="nav-link active" href="/customer/profile">Perfil</a>-->
                        <div sec:authorize="isAuthenticated()" class="dropdown text-end">
                            <a class="d-block link-dark text-decoration-none dropdown-toggle" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                                <th:block th:if="${session.customersession != null}">
                                    <img th:if="${session.customersession.photo != null}"
                                         th:src="@{/customer/photo/{id}(id=${session.customersession.photo.id})}"
                                         class="rounded-circle" width="50" height="50">
                                </th:block>
                                <th:block th:if="${session.authorsession != null}">
                                    <img th:if="${session.authorsession.photo != null}"
                                         th:src="@{/author/photo/{id}(id=${session.authorsession.photo.id})}"
                                         class="rounded-circle" width="50" height="50">
                                </th:block>
<!--                                <img th:if="${session.customersession.photo != null and session.customersession.photo != null}"
                                     th:src="@{/customer/photo/{id}(id=${session.customersession.photo.id})}" alt="Foto de perfil" class="rounded-circle" width="50" height="50">
                                <img th:if="${session.authorsession.photo != null and session.authorsession.photo != null}"
                                     th:src="@{/author/photo/{id}(id=${session.authorsession.photo.id})}" alt="Foto de perfil" class="rounded-circle" width="50" height="50">-->
                            </a>
                            <ul th:if="${session.customersession != null}" class="dropdown-menu text-small" aria-labelledby="dropdownUser1">
                                <li><a class="dropdown-item" th:href="@{/customer/profile}">Perfil</a></li>
                                <li><a class="dropdown-item" th:href="@{/customer/edit-profile}">Editar perfil</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" th:href="@{/logout}">Cerrar Sesión</a></li>
                            </ul>
                            <ul th:if="${session.authorsession != null}" class="dropdown-menu text-small" aria-labelledby="dropdownUser1">
                                <li><a class="dropdown-item" th:href="@{/author/profile}">Perfil</a></li>
                                <li><a class="dropdown-item" th:href="@{/author/edit-profile}">Editar perfil</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" th:href="@{/logout}">Cerrar Sesión</a></li>
                            </ul>
                        </div>
                    </div>
                </div>

            </nav>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" 
                crossorigin="anonymous">
        </script>
    </body>
</html>
