<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.name}">Libro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav th:replace="fragments/fragments :: navbar"></nav>

<div class="container my-5">

    <div class="card shadow-lg border-0">
        <div class="row g-0">

            <!-- PORTADA -->
            <div class="col-md-4 text-center p-4">

                <img th:if="${book.photo != null}"
                     th:src="@{/book/photo/{id}(id=${book.photo.id})}"
                     width="250" height="250">>

                <img th:if="${book.photo == null}"
                     src="https://via.placeholder.com/350x500?text=Sin+Portada"
                     class="img-fluid rounded shadow"
                     alt="Sin portada">

            </div>

            <!-- INFORMACIÓN -->
            <div class="col-md-8">
                <div class="card-body">

                    <h1 class="card-title mb-4"
                        th:text="${book.name}">
                        Nombre del libro
                    </h1>

                    <!-- DESCRIPCIÓN -->
                    <h4>Descripción</h4>

<!--                    <p class="text-muted"
                       th:text="${book.description}">
                        Aquí irá la descripción del libro.
                    </p>-->

                    <hr>

                    <!-- DATOS -->
                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <strong>Género:</strong>
                            <span th:text="${book.category}"></span>
                        </div>

                        <div class="col-md-6 mb-3">
                            <strong>Stock disponible:</strong>
                            <span th:text="${book.stock}"></span>
                        </div>

                        <div class="col-md-6 mb-3">
                            <strong>Cantidad de páginas:</strong>
                            <span th:text="${book.pages}"></span>
                        </div>

                        <div class="col-md-6 mb-3">
                            <strong>Precio:</strong>
                            $<span th:text="${book.price}"></span>
                        </div>

                        <div class="col-md-6 mb-3">
                            <strong>paginas:</strong>
                            <span th:text="${book.pages}"></span>
                        </div>
                        
                        
                    </div>

                    <hr>

                    <!-- BOTÓN DE COMPRA -->
                    <div class="mt-4">
                        <a href="#"
                           class="btn btn-success btn-lg">
                            Comprar Libro
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
